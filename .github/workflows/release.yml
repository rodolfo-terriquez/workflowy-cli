name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check release metadata
        run: bun run release:check

      - name: Test
        run: bun test

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p release

          bun build --compile --target=bun-darwin-arm64 cli/wf.ts --outfile "release/wf-${version}-macos-arm64"
          bun build --compile --target=bun-darwin-x64 cli/wf.ts --outfile "release/wf-${version}-macos-x64"
          bun build --compile --target=bun-linux-x64-baseline cli/wf.ts --outfile "release/wf-${version}-linux-x64"
          bun build --compile --target=bun-linux-arm64 cli/wf.ts --outfile "release/wf-${version}-linux-arm64"
          bun build --compile --target=bun-windows-x64-baseline cli/wf.ts --outfile "release/wf-${version}-windows-x64.exe"
          bun build --compile --target=bun-windows-arm64 cli/wf.ts --outfile "release/wf-${version}-windows-arm64.exe"

          chmod +x release/wf-${version}-macos-* release/wf-${version}-linux-*

      - name: Linux smoke test
        shell: bash
        run: |
          set -euo pipefail
          "release/wf-${GITHUB_REF_NAME}-linux-x64" --version
          "release/wf-${GITHUB_REF_NAME}-linux-x64" version

      - name: Add installer scripts
        shell: bash
        run: |
          set -euo pipefail
          cp install.sh release/install.sh
          cp install.ps1 release/install.ps1
          chmod +x release/install.sh

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: release/*
